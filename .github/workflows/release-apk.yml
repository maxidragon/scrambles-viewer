name: Build APK and attach to Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set app version from release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '$VERSION';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Set expo.version to $VERSION');
          "

      - name: Build APK on EAS
        run: eas build --platform android --profile preview --non-interactive --wait --json > build-output.json

      - name: Extract build URL
        id: extract
        run: |
          URL=$(cat build-output.json | jq -r '.[0].artifacts.buildUrl')
          echo "apk_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: curl -L "${{ steps.extract.outputs.apk_url }}" -o app-release.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}